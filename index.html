<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Viewer Analytics Dashboard</title>
    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- เชื่อมโยงไฟล์ CSS -->
    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <div class="container">
        <!-- Header -->
        <header>
            <h1>YT Viewer <span>Analytics</span></h1>
            <div class="update-status">ข้อมูลอัปเดตแบบ Real-time</div>
        </header>

        <!-- แผงเวลารวมวันนี้ -->
        <div class="today-overview-box">
            <div class="today-info">
                <h2>เวลาเข้าชมรวมวันนี้ (Today's Total Watch Time)</h2>
                <div class="total-time" id="live-total-time">00 ชม. 00 น. 00 ว.</div>
            </div>
            <div class="today-date">
                <div id="current-date">วันที่โหลดข้อมูล...</div>
                <div id="current-time">00:00:00</div>
            </div>
        </div>

        <!-- โซนการ์ด 4 หมวดหมู่ (จะถูกสร้างและใส่ข้อมูลอัตโนมัติด้วย JavaScript) -->
        <div class="category-grid" id="category-grid-container"></div>
    </div>

    <!-- JavaScript สำหรับคำนวณและดึงข้อมูลมาแสดงผลอัตโนมัติ -->
    <script>
        // 📊 1. ชุดข้อมูลดิบ (เปลี่ยนตัวเลขตรงนี้ได้เลย ระบบจะคำนวณกราฟและเวลารวมให้เอง)
        const youtubeData = [
            {
                key: 'music',
                title: 'ดนตรี (Music)',
                badge: 'เพลง & มิวสิควิดีโอ',
                // ใส่ข้อมูลชั่วโมงเข้าชมของแต่ละวัน [จ, อ, พ, พฤ, ศ, ส, อา]
                dailyHours: [6, 4.5, 5, 7.5, 9, 4, 6.2] 
            },
            {
                key: 'live',
                title: 'ไลฟ์สด (Live Stream)',
                badge: 'สตรีมมิ่ง & เกม',
                dailyHours: [5, 7.5, 4, 8.2, 12, 16, 15.7]
            },
            {
                key: 'news',
                title: 'ข่าว (News & Blogs)',
                badge: 'สาระ & ทันเหตุการณ์',
                dailyHours: [3.5, 3, 2.5, 2, 1.8, 2.8, 2.6]
            },
            {
                key: 'shorts',
                title: 'คลิปสั้น (Shorts)',
                badge: 'บันเทิงแบบเร่งด่วน',
                dailyHours: [3.2, 4.1, 5.5, 2.9, 4, 4.8, 4.5]
            }
        ];

        const dayLabels = ['จ.', 'อ.', 'พ.', 'พฤ.', 'ศ.', 'ส.', 'อา.'];

        // 🛠️ 2. ฟังก์ชันสร้างการ์ดและคำนวณอัตโนมัติ
        function renderDashboard() {
            const container = document.getElementById('category-grid-container');
            container.innerHTML = ''; // เคลียร์หน้าจอก่อนวาด

            youtubeData.forEach(cat => {
                // คำนวณเวลารวม 7 วัน
                const totalHours = cat.dailyHours.reduce((a, b) => a + b, 0);
                const fullHours = Math.floor(totalHours);
                const minutes = Math.round((totalHours - fullHours) * 60);
                
                // หาค่าชั่วโมงที่สูงที่สุดในหมวดหมู่นั้น เพื่อใช้อ้างอิงความสูงกราฟ 100%
                const maxHour = Math.max(...cat.dailyHours);

                // สร้าง HTML สำหรับแท่งกราฟแต่ละวัน
                let chartHtml = '';
                cat.dailyHours.forEach((hours, index) => {
                    // คำนวณความสูงเป็น % โดยเทียบกับวันที่มีสถิติสูงสุด
                    const barHeight = maxHour > 0 ? (hours / maxHour) * 85 : 0; 
                    
                    chartHtml += `
                        <div class="bar-wrapper">
                            <div class="bar" style="height: ${barHeight}%;" data-time="${hours} ชม."></div>
                            <span class="day-label">${dayLabels[index]}</span>
                        </div>
                    `;
                });

                // ประกอบร่างการ์ดแต่ละหมวดหมู่
                const cardHtml = `
                    <div class="category-card ${cat.key}">
                        <div class="card-header">
                            <div class="card-title">${cat.title}</div>
                            <span class="badge">${cat.badge}</span>
                        </div>
                        <div class="weekly-total">
                            <div class="label">7 วันที่ผ่านมา</div>
                            <div class="time">${fullHours} ชม. ${minutes > 0 ? minutes + ' น.' : ''}</div>
                        </div>
                        <div class="chart-container">
                            ${chartHtml}
                        </div>
                    </div>
                `;
                
                container.innerHTML += cardHtml;
            });
        }

        // ⏱️ 3. ฟังก์ชันนับเวลา Real-time ของวันนี้ด้านบน
        let totalSecondsToday = 28450; 
        function updateLiveTime() {
            totalSecondsToday += Math.floor(Math.random() * 3) + 1; 

            const hrs = Math.floor(totalSecondsToday / 3600);
            const mins = Math.floor((totalSecondsToday % 3600) / 60);
            const secs = totalSecondsToday % 60;

            document.getElementById('live-total-time').innerText = 
                `${String(hrs).padStart(2, '0')} ชม. ${String(mins).padStart(2, '0')} น. ${String(secs).padStart(2, '0')} ว.`;

            const now = new Date();
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('current-date').innerText = now.toLocaleDateString('th-TH', options);
            document.getElementById('current-time').innerText = now.toLocaleTimeString('th-TH');
        }

        // สั่งให้ระบบทำงานเมื่อโหลดหน้าเว็บ
        renderDashboard();
        setInterval(updateLiveTime, 1000);
        updateLiveTime();
    </script>
</body>
</html>
