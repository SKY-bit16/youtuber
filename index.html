<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Viewer Analytics Dashboard</title>
    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- เชื่อมโยงไฟล์ CSS -->
    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <div class="container">
        <!-- Header -->
        <header>
            <h1>YT Viewer <span>Analytics</span></h1>
            <div class="update-status">ข้อมูลอัปเดตแบบ Real-time</div>
        </header>

        <!-- แผงเวลารวมวันนี้ -->
        <div class="today-overview-box">
            <div class="today-info">
                <h2>เวลาเข้าชมรวมวันนี้ (Today's Total Watch Time)</h2>
                <div class="total-time" id="live-total-time">00 ชม. 00 น. 00 ว.</div>
            </div>
            <div class="today-date">
                <div id="current-date">วันที่โหลดข้อมูล...</div>
                <div id="current-time">00:00:00</div>
            </div>
        </div>

        <!-- โซนการ์ด 4 หมวดหมู่ -->
        <div class="category-grid" id="category-grid-container"></div>

        <!-- 🔥 เพิ่มส่วนแสดงสถานะการดูสดด้านล่าง (Live Watching Status) -->
        <div class="live-activity-box">
            <div class="activity-header">
                <span class="live-dot"></span> สถานะการเข้าชมล่าสุด (Live Activity)
            </div>
            <div class="ticker-wrapper">
                <div class="ticker-container" id="ticker-container">
                    <!-- ข้อมูลจะถูกดึงมาใส่และเลื่อนตรงนี้โดย JavaScript -->
                </div>
            </div>
        </div>
    </div>

!-- JavaScript สำหรับคำนวณกราฟ สุ่มกิจกรรม และนับเวลา Real-time -->
    <script>
        // 📊 1. ชุดข้อมูลสถิติของกราฟ (เหมือนเดิม)
        const youtubeData = [
            { key: 'music', title: 'ดนตรี (Music)', badge: 'เพลง & มิวสิควิดีโอ', dailyHours: [6, 4.5, 5, 7.5, 9, 4, 6.2] },
            { key: 'live', title: 'ไลฟ์สด (Live Stream)', badge: 'สตรีมมิ่ง & เกม', dailyHours: [5, 7.5, 4, 8.2, 12, 16, 15.7] },
            { key: 'news', title: 'ข่าว (News & Blogs)', badge: 'สาระ & ทันเหตุการณ์', dailyHours: [3.5, 3, 2.5, 2, 1.8, 2.8, 2.6] },
            { key: 'shorts', title: 'คลิปสั้น (Shorts)', badge: 'บันเทิงแบบเร่งด่วน', dailyHours: [3.2, 4.1, 5.5, 2.9, 4, 4.8, 4.5] }
        ];

        // 🎲 2. คลังข้อมูลดิบสำหรับสุ่ม (เพิ่ม/ลด รายชื่อหรือคลิปตรงนี้ได้เลย)
        const rawUsers = [
            "สมชาย สายลุย", "มินตรา น่ารัก", "กิตติพงษ์ วงศ์คำ", "ณัฐชา พาเพลิน", 
            "ธนกร ยอดนักสตรีม", "อนันต์ เปี่ยมดี", "ศิริพร สอนง่าย", "วีรชัย ชัยชนะ",
            "พีรพล แซ่ลี้", "ชลลดา ตาหวาน"
        ];

        const rawVideos = [
            "LIVE: แข่งขัน Esport รอบชิงชนะเลิศประจำปี",
            "Official MV - ซิงเกิ้ลใหม่ล่าสุดดนตรีป็อป",
            "สรุปข่าวเด่นรอบวัน สาระเด่นประเด็นร้อน",
            "ล้างตู้เย็นยังไงให้สะอาดภายใน 60 วินาที #Shorts",
            "สอนเขียนโค้ด HTML CSS ฉบับมือใหม่เข้าใจง่าย",
            "VLOG: พาทัวร์คาเฟ่เปิดใหม่สไตล์มินิมอล",
            "10 อันดับของกินในเซเว่นที่ต้องลองปี 2026",
            "สตรีมสด: เล่นเกมเอาชีวิตรอดในเกาะร้างกับเพื่อนๆ",
            "คลิปตลกขำขัน รวมเรื่องฮาประจำสัปดาห์ #Shorts",
            "รีวิวแกะกล่องสมาร์ทโฟนรุ่นสเปกแรงราคาสุดคุ้ม"
        ];

        const rawTimes = ["เมื่อสักครู่", "1 นาทีที่แล้ว", "2 นาทีที่แล้ว", "3 นาทีที่แล้ว", "5 นาทีที่แล้ว"];

        const dayLabels = ['จ.', 'อ.', 'พ.', 'พฤ.', 'ศ.', 'ส.', 'อา.'];

        // 🛠️ 3. ฟังก์ชันสร้างการ์ดกราฟอัตโนมัติ
        function renderDashboard() {
            const container = document.getElementById('category-grid-container');
            container.innerHTML = '';
            youtubeData.forEach(cat => {
                const totalHours = cat.dailyHours.reduce((a, b) => a + b, 0);
                const fullHours = Math.floor(totalHours);
                const minutes = Math.round((totalHours - fullHours) * 60);
                const maxHour = Math.max(...cat.dailyHours);

                let chartHtml = '';
                cat.dailyHours.forEach((hours, index) => {
                    const barHeight = maxHour > 0 ? (hours / maxHour) * 85 : 0; 
                    chartHtml += `
                        <div class="bar-wrapper">
                            <div class="bar" style="height: ${barHeight}%;" data-time="${hours} ชม."></div>
                            <span class="day-label">${dayLabels[index]}</span>
                        </div>
                    `;
                });

                container.innerHTML += `
                    <div class="category-card ${cat.key}">
                        <div class="card-header">
                            <div class="card-title">${cat.title}</div>
                            <span class="badge">${cat.badge}</span>
                        </div>
                        <div class="weekly-total">
                            <div class="label">7 วันที่ผ่านมา</div>
                            <div class="time">${fullHours} ชม. ${minutes > 0 ? minutes + ' น.' : ''}</div>
                        </div>
                        <div class="chart-container">${chartHtml}</div>
                    </div>
                `;
            });
        }

        // 🔄 4. ฟังก์ชันสุ่มไอเทมจาก Array
        function getRandomItem(array) {
            return array[Math.floor(Math.random() * array.length)];
        }

        // 🛠️ 5. ฟังก์ชันสร้าง HTML ของแถวกิจกรรมจากการสุ่ม
        function createTickerItemHTML() {
            const randomUser = getRandomItem(rawUsers);
            const randomVideo = getRandomItem(rawVideos);
            const randomTime = getRandomItem(rawTimes);

            return `
                <div class="ticker-item">
                    <div class="user-name">👤 ${randomUser}</div>
                    <div class="video-title">🎬 กำลังรับชม: <span>${randomVideo}</span></div>
                    <div class="activity-time">⏱️ ${randomTime}</div>
                </div>
            `;
        }

        // 🔄 6. ฟังก์ชันจัดการสร้างและสไลด์แบบสุ่มตลอดเวลา
        function initActivityTicker() {
            const ticker = document.getElementById('ticker-container');
            ticker.innerHTML = '';

            // สร้างไอเทมเริ่มต้นไว้ 2 ชิ้นก่อน (ชิ้นที่แสดงอยู่ กับ ชิ้นถัดไปที่จ่อรออยู่ด้านล่าง)
            ticker.innerHTML += createTickerItemHTML();
            ticker.innerHTML += createTickerItemHTML();

            const itemHeight = 60; // ความสูงต่อแถว

            setInterval(() => {
                // 1. สั่งให้สไลด์เลื่อนขึ้น 1 แถว
                ticker.style.transition = "transform 0.5s ease-in-out";
                ticker.style.transform = `translateY(-${itemHeight}px)`;

                // 2. หลังจากแอนิเมชันเลื่อนขึ้นเสร็จสิ้น (ใช้เวลา 0.5 วินาที)
                setTimeout(() => {
                    // ลบไอเทมบนสุดที่เพิ่งเลื่อนหายไปออก
                    ticker.removeChild(ticker.children[0]);
                    
                    // ปิดแอนิเมชันชั่วคราว แล้วดีดตัว container กลับมาตำแหน่งเดิม (เพื่อรอเลื่อนครั้งต่อไป)
                    ticker.style.transition = "none";
                    ticker.style.transform = `translateY(0px)`;
                    
                    // สุ่มสร้างไอเทมใหม่เข้าไปต่อคิวด้านล่างสุดแบบ Real-time 
                    ticker.innerHTML += createTickerItemHTML();
                }, 500);

            }, 2500); // วนลูปทุก 2.5 วินาที (ค้างไว้ 2 วินาที + เล่นแอนิเมชันเลื่อนขึ้น 0.5 วินาที)
        }

        // ⏱️ 7. ระบบเวลา Real-time ด้านบน
        let totalSecondsToday = 28450; 
        function updateLiveTime() {
            totalSecondsToday += Math.floor(Math.random() * 3) + 1; 
            const hrs = Math.floor(totalSecondsToday / 3600);
            const mins = Math.floor((totalSecondsToday % 3600) / 60);
            const secs = totalSecondsToday % 60;

            document.getElementById('live-total-time').innerText = 
                `${String(hrs).padStart(2, '0')} ชม. ${String(mins).padStart(2, '0')} น. ${String(secs).padStart(2, '0')} ว.`;

            const now = new Date();
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('current-date').innerText = now.toLocaleDateString('th-TH', options);
            document.getElementById('current-time').innerText = now.toLocaleTimeString('th-TH');
        }

        // สั่งเปิดตัวทำงานทั้งหมด
        renderDashboard();
        initActivityTicker();
        setInterval(updateLiveTime, 1000);
        updateLiveTime();
    </script>
</body>
</html>
